<!DOCTYPE html>
<html>
<head>

<title>Product Details - Neha Rani Studio</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="product-detail-page">

<div class="product-detail-image">

<img id="mainProductImage" src="" alt="Product">

</div>


<div class="product-detail-info">

<h1 id="productName"></h1>

<h2 id="productPrice"></h2>


<div class="product-description">

<h3>Description</h3>

<p>
Experience premium quality and elegant design from Neha Rani Studio.
Our products are carefully selected to bring style, beauty and luxury to your everyday life.
</p>

</div>

<button class="product-btn">
Add To Cart
</button>


<a id="whatsappBtn" class="hero-btn">
Order Now
</a>

<h3>Customer Reviews</h3>

<div class="reviews-box">

<div class="review-stars">
⭐⭐⭐⭐⭐
</div>

<p>
Amazing quality and beautiful packaging.
</p>

</div>

</div>


<script>

let params = new URLSearchParams(window.location.search);

let id = params.get("id");


if(id==="gift-box"){

document.getElementById("mainProductImage").src =
"images/products/product1-1.jpg";


document.getElementById("productName").innerText =
"Luxury Gift Box";


document.getElementById("productPrice").innerText =
"Rs. 2,999";


document.getElementById("whatsappBtn").href =
"https://wa.me/923045255325";

}

</script>


</body>
</html>
